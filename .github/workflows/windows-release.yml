name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python tools/check_tag_version.py "$TAG"

      - name: Run backend checks
        run: |
          python -m ruff check .
          python -m mypy
          python -m pytest -q

      - name: Run frontend checks
        run: |
          npm run lint:frontend
          npm run format:frontend:check

      - name: Build portable Windows app
        run: python -m PyInstaller --noconfirm packaging/bubba_media_viewer.spec

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path dist\BubbaMediaViewer\* -DestinationPath dist\BubbaMediaViewer-windows-x64.zip

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BubbaMediaViewer-windows-x64
          path: dist/BubbaMediaViewer-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BubbaMediaViewer-windows-x64.zip
          generate_release_notes: true
